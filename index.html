<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="./style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="full-container">

        <div class="container">
            <div class="top-area">
               <div class="showcontent"></div>
            </div>
            <div class="buttons">
                <button class="calc-btns op operator" value="%">%</button>
                <button class="calc-btns op operator" value="/">/</button>
                <button class="calc-btns err" >C</button>
                <button class="calc-btns bcksp" ><i class="bi bi-backspace"></i></button>
                <button class="calc-btns num" value="7">7</button>
                <button class="calc-btns num" value="8">8</button>
                <button class="calc-btns num" value="9">9</button>
                <button class="calc-btns op operator" value="+">+</button>
                <button class="calc-btns num" value="4">4</button>
                <button class="calc-btns num" value="5">5</button>
                <button class="calc-btns num" value="6">6</button>
                <button class="calc-btns op operator" value="*">*</button>
                <button class="calc-btns num" value="1">1</button>
                <button class="calc-btns num" value="2">2</button>
                <button class="calc-btns num" value="3">3</button>
                <button class="calc-btns op operator" value="-">-</button>
                <button class="calc-btns decimal" value=".">.</button>
                <button class="calc-btns num" value="0">0</button>
                <button class="toggle-pn" value="+/-">+/-</button>
                <button class="calc-btns eq equals">=</button>
    
                <script src="./script.js"></script>
            </div>
        </div>
    </div>
</body>
</html>
